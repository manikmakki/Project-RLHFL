version: '3.8'

services:
  rlhfl:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rlhfl
    ports:
      - "8000:8000"
    volumes:
      - ./volumes/models:/models
      - ./volumes/data:/data
      - ./volumes/config:/config
      - ./volumes/checkpoints:/checkpoints
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - CONFIG_PATH=/config/system_config.yaml
      - DATA_PATH=/data
      - CHECKPOINTS_PATH=/checkpoints
      # oneDNN (used for BF16 CPU ops) has its own thread pool separate from torch.set_num_threads().
      # These must match training.cpu_threads in system_config.yaml.
      - OMP_NUM_THREADS=32
      - MKL_NUM_THREADS=32
      - OPENBLAS_NUM_THREADS=32
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - llm-network

networks:
  llm-network:
    driver: bridge
