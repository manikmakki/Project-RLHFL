version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: llm-api
    ports:
      - "8000:8000"
    volumes:
      - ./volumes/models:/models
      - ./volumes/data:/data
      - ./volumes/config:/config
      - ./volumes/checkpoints:/checkpoints
      - ./scripts:/app/scripts
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - MODEL_PATH=/models/gpt-oss-20b-Q4_K_M.gguf
      - BASE_MODEL_PATH=/models/gpt-oss-20b-base
      - CONFIG_PATH=/config/system_config.yaml
      - DATA_PATH=/data
      - CHECKPOINTS_PATH=/checkpoints
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - llm-network

  trainer:
    build:
      context: .
      dockerfile: Dockerfile.trainer
    container_name: llm-trainer
    volumes:
      - ./volumes/models:/models
      - ./volumes/data:/data
      - ./volumes/checkpoints:/checkpoints
      - ./volumes/config:/config
      - ./scripts:/app/scripts
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - BASE_MODEL_PATH=/models/gpt-oss-20b-base
      - CONFIG_PATH=/config/system_config.yaml
      - DATA_PATH=/data
      - CHECKPOINTS_PATH=/checkpoints
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    networks:
      - llm-network

  ollama:
    image: ollama/ollama:latest
    container_name: llm-ollama
    ports:
      - "11434:11434"
    volumes:
      - ./volumes/checkpoints:/checkpoints
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_KEEP_ALIVE=30m
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_CONTEXT_LENGTH=32768
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - llm-network

networks:
  llm-network:
    driver: bridge

volumes:
  ollama-data:

