memory:
  batch_size: 32
  embedding_model: all-MiniLM-L6-v2
  max_memory_age_days: 90
  max_db_size_gb: 25
  auto_cleanup_threshold: 0.9
  auto_cleanup_percentage: 0.1
  min_weight_threshold: 0.5
  top_n_weighted_interactions: 1000

model:
  model_id: ministral-3:14b                   # Single source of truth for model name
  base_model_path: /models/Ministral-3-14B    # Base path for Ollama models (pointing to the directory containing the model, not the model file itself)
  response_format: openai                     # Use OpenAI format for compatibility with tools and sentiment analysis
  context_length: 32768                       # Match to Ollama's configured context length for safety
  max_tokens: 4096                            # Max tokens for generation (keep well below context length to allow for system prompts and tool outputs) 
  n_threads: 48                               # Number of CPU threads for inference (adjust based on your hardware)

sentiment:
  continuation_baseline: 0.1
  explicit_instruction_boost: 3.0
  negative_threshold: -0.3
  positive_threshold: 0.3

llm_proxy:
  base_url: http://llm-ollama:11434
  endpoint_type: auto
  api_key: null
  connect_timeout_seconds: 10
  read_timeout_seconds: 120
  max_retries: 2
  retry_delay_seconds: 1.0
  max_connections: 10
  max_keepalive_connections: 5

training:
  batch_size: 2
  gradient_accumulation_steps: 4
  inactivity_threshold_hours: 8
  learning_rate: 5.0e-05
  lora_alpha: 32
  lora_rank: 8
  max_days_between_training: 7
  max_grad_norm: 1.0
  min_interactions_threshold: 50
  num_epochs: 3
  validation_split: 0.1
  warmup_steps: 100
  weight_decay: 0.01
  cpu_threads: 32
  enable_dpo: true
  dpo_beta: 0.1
  dpo_batch_size: 8
  dpo_rejection_timeout: 300
  sft_trigger_threshold: 20
  dpo_trigger_threshold: 5
  dpo_mode_threshold: 5
  schedule_enabled: true
  schedule_time: "01:00"
  schedule_timezone: America/New_York
  schedule_window_minutes: 60
  enable_ollama_deployment: true
  max_checkpoint_count: 3
  max_gguf_files: 2

psyche:
  enabled: false

  # ── Multi-model roles (empty = use model.model_id) ──
  id_model: ""
  ego_model: ""
  superego_model: "" 

  # ── Refinement pipeline ──
  refinement_enabled: false       # whether to enable the refinement pipeline at all
  max_refinement_turns: 2         # maximum number of refinement iterations before final acceptance or rejection
  quality_threshold: 0.7          # minimum quality score for accepting a response without refinement
  min_quality_for_accept: 0.5     # minimum quality score for accepting a response after refinement iterations
  complexity_bypass_chars: 50     # if response is shorter than this, bypass refinement and accept as is
  refinement_bypass_tools: true   # if response invokes tools, bypass refinement and accept as is

  # ── Client parameter control ──
  override_client_params: true    # whether to allow overriding of parameters like temperature and top_p from the client side

  # ── Superego parameter control ──
  superego_param_control: true
  superego_temp_range: [0.1, 1.2]
  superego_top_p_range: [0.3, 1.0]
  superego_top_k_range: [5, 100]
  superego_judge_max_tokens: 100

  # ── Superego self-introspection ──
  superego_introspection_interval: 25
  superego_profile_path: "/data/superego_profile.json"

  # ── Deliberation exposure ──
  expose_deliberation: false

  # ── Id Engine ──
  id_enabled: true
  id_session_window: 10

  # ── Safety layer ──
  superego_enabled: false            # safety checks off (pattern matching + LLM judge)
  superego_safety_judge: false       # LLM judge (false = pattern-matching only, no model call)
  superego_permissive_framing: true
  superego_refusal_retry: true
  superego_max_retries: 1
  superego_judge_timeout_seconds: 15
  superego_danger_patterns:
  - "rm -rf /"
  - ":(){ :|:& };:"
  - "mkfs."
  - "dd if=/dev/zero"
  - "> /dev/sda"
  superego_safe_patterns:
  - "localhost"
  - "127.0.0.1"
  - "0.0.0.0"
  - "::1"
